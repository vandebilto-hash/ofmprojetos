services:
  postgres:
    image: postgres:16-alpine
    container_name: projetese-postgres
    environment:
      POSTGRES_DB: projetese
      POSTGRES_USER: projete
      POSTGRES_PASSWORD: projete
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projete -d projetese"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: projetese-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: projete
      MINIO_ROOT_PASSWORD: projete-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mpp-service:
    build:
      context: ./services/mpp-service
    container_name: projetese-mpp-service
    environment:
      SERVER_PORT: 8081
    ports:
      - "8081:8081"

volumes:
  postgres-data:
  minio-data:
